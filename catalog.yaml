      - {stem: lab02_hub_discover, module: m2, track: economy, sandbox: hub-lite}
      - {stem: lab03_escrow_channel, module: m3, track: economy, sandbox: hub-lite}
      - {stem: lab04_reputation_trust, module: m4, track: economy, sandbox: hub-lite}
      - {stem: lab05_publish_capability, module: m5, track: economy, sandbox: hub-lite}
      - {stem: lab06_paid_capability_capstone, module: m6, track: advanced, sandbox: true}

