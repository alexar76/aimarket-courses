# Course catalog — source specs for courses/_tooling/scaffold_course.py
# Each entry becomes courses/<folder>/ in the monorepo and a GitHub satellite repo.
#
# NOTE: orchestration-course is the TEMPLATE the scaffolder copies from, not a
# scaffold target, so it is intentionally absent here (see courses/README.md for
# the full index of all 10 courses). The live courses under courses/<folder>/ are
# the source of truth and have grown beyond these starting specs; the `labs:` lists
# below are kept in sync with each course's real course.config.json. Re-running the
# scaffolder over an existing course needs --force and will OVERWRITE real content —
# don't do that for a shipped course.

courses:
  - id: course-verifiable-randomness
    folder: verifiable-randomness-course
    repo: verifiable-randomness-course
    package_name: verifiable-randomness-course
    title: "Verifiable Randomness & Cryptographic Time"
    tagline: "Build and break biased lotteries — then verify proofs offline from 80 bytes."
    description: "Hands-on course on verifiable randomness, VDFs, ECVRF, and time-lock puzzles using live AIMarket oracles."
    pip_extras_default: "[dev]"
    footer: "Part of the AIMarket ecosystem — Platon, Chronos, Sortes, and Aestus oracles as a live sandbox."
    topic_module: randomness
    modules:
      m1: {title: "Chaos VRF with Platon", concept: "Unbiasable randomness from a verifiable chaos oracle.", industry: "lottery, gaming"}
      m2: {title: "VDF time with Chronos", concept: "Vesolovsky VDF proves elapsed work — not wall-clock trust.", industry: "time stamps, delays"}
      m3: {title: "ECVRF & Sortes", concept: "RFC 9381 ECVRF proofs you can verify offline.", industry: "VRF standards"}
      m4: {title: "Time-lock RSW with Aestus", concept: "Encrypt now, decrypt after provable delay.", industry: "commit-reveal, sealed bids"}
      m5: {title: "Commit–reveal & bias attacks", concept: "Build a biased lottery, then break it with verifiable draws.", industry: "security audits"}
      m6: {title: "On-chain verification", concept: "Verify VDF and VRF proofs in Solidity on Base testnet.", industry: "lottery/ consumer"}
    labs:
      - {stem: lab01_platon_chaos, module: m1, track: basic}
      - {stem: lab02_chronos_vdf, module: m2, track: basic}
      - {stem: lab03_sortes_ecvrf, module: m3, track: basic}
      - {stem: lab04_aestus_timelock, module: m4, track: basic}
      - {stem: lab05_commit_reveal, module: m5, track: economy}
      - {stem: lab06_onchain_consumer, module: m6, track: advanced}

  - id: course-mcp-security
    folder: mcp-security-course
    repo: mcp-security-course
    package_name: mcp-security-course
    title: "MCP Security & Agent Safety"
    tagline: "Threat-model MCP, catch tool poisoning with WARDEN, harden agents with LUMEN scoring."
    description: "Hands-on course on MCP threat models, static scanning, and the WARDEN firewall for agent safety."
    pip_extras_default: "[dev]"
    footer: "Part of the AIMarket ecosystem — WARDEN (argus) as a live MCP firewall sandbox."
    topic_module: warden
    modules:
      m1: {title: "MCP threat model", concept: "Prompt injection, tool poisoning, and data exfiltration paths.", industry: "MCP, agent frameworks"}
      m2: {title: "Static scan & policy", concept: "Catch malicious tool schemas before an agent runs them.", industry: "SAST, policy engines"}
      m3: {title: "LUMEN trust scoring", concept: "Score MCP servers and capabilities with graph-based trust.", industry: "reputation, PageRank"}
      m4: {title: "Owner-lock & fail-closed", concept: "Bind agents to owner-approved tool allowlists.", industry: "zero-trust agents"}
      m5: {title: "Capstone: malicious server", concept: "Write a poisoned MCP server and catch it with WARDEN.", industry: "red team / blue team"}
    labs:
      - {stem: lab01_threat_model, module: m1, track: basic}
      - {stem: lab02_static_scan, module: m2, track: basic}
      - {stem: lab03_lumen_score, module: m3, track: basic}
      - {stem: lab04_owner_lock, module: m4, track: basic}
      - {stem: lab05_warden_capstone, module: m5, track: advanced}

