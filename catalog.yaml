      m2: {title: "SDK & Hub integration", concept: "Register, discover, and invoke across a real hub.", industry: "aimarket-agent SDK"}
      m3: {title: "Escrow & payment channels", concept: "Hold funds until delivery; stream micropayments.", industry: "USDC, channels"}
