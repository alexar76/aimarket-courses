      m1: {title: "Murmuration consensus", concept: "Robust DeGroot consensus and Tukey-biweight aggregation over agent estimates.", industry: "swarm intelligence, robust stats"}
      m2: {title: "Colony TSP certificate", concept: "Nearest-neighbour + 2-opt tour with an admissible optimality-gap bound.", industry: "routing, combinatorial optimization"}
